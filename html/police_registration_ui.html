<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <title>Advanced Police Registration Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/police_registration_ui.css">


</head>

<body>

    <!--Made by - Kanis Fatema Etu - 1208 -->
    
    <div class="registration-container">

        <div id="signUpMessage" class="alert d-none"></div>

        <div class="form-header">
            <h2>Police Registration</h2>
        </div>

        <form id="policeForm">


            <!-- PERSONAL -->
            <div class="section-title">Personal Information</div>
            <div class="input-grid">

                <div class="input-group full-width">
                    <label>Full Name (as per NID)</label>
                    <input type="text" id="name" required>
                </div>

                <div class="input-group">
                    <label>Father's Name</label>
                    <input type="text" id="father" required>
                </div>

                <div class="input-group">
                    <label>Mother's Name</label>
                    <input type="text" id="mother" required>
                </div>

                <div class="input-group">
                    <label>Date of Birth</label>
                    <input type="date" id="dob" required>
                </div>

                <div class="input-group">
                    <label>Nationality</label>
                    <input type="text" value="Bangladeshi" readonly>
                </div>

                <div class="input-group">
                    <label>Blood Group</label>
                    <select id="bloodGroup" required>
                        <option value="">Choose...</option>
                        <option>A+</option>
                        <option>A-</option>
                        <option>B+</option>
                        <option>B-</option>
                        <option>O+</option>
                        <option>O-</option>
                        <option>AB+</option>
                        <option>AB-</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>NID Number</label>
                    <input type="number" id="nid" required>
                </div>
            </div>

            <!-- PROFESSIONAL -->
            <div class="section-title">Professional Identity</div>
            <div class="input-grid">

                <div class="input-group">
                    <label>Police ID</label>
                    <input type="text" id="policeId" required>
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>

                <div class="input-group">
                    <label>Designation</label>
                    <input type="text" id="designation" required>
                </div>

                <div class="input-group">
                    <label>Gender</label>
                    <select id="gender" required>
                        <option value="">Select Gender</option>
                        <option>Male</option>
                        <option>Female</option>
                    </select>
                </div>
            </div>

            <!-- ADDRESS -->
            <div class="section-title">Contact & Address</div>
            <div class="input-grid">

                <div class="input-group">
                    <label>Present Address</label>
                    <textarea id="presentAddress"></textarea>
                </div>

                <div class="input-group">
                    <label>Permanent Address</label>
                    <textarea id="permanentAddress"></textarea>
                </div>
            </div>

            <!-- SECURITY -->
            <div class="section-title">Security</div>
            <div class="input-grid">

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" required>
                </div>

                <button type="submit" id="submitRegistration" class="submit-btn">Complete Registration</button>
            </div>

        </form>
    </div>

        <h3 style="margin-bottom: 5px;">Myriyad4 Tech</h3>
        <p style="color: #64748b; margin-bottom: 15px;">Innovating the digital world with smart solutions</p>

    </footer>

</body>

</html>
